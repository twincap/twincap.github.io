<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Twincap</title>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1904073424792088" crossorigin="anonymous"></script>
    <style>
      :root {
        color-scheme: light;
      }
      body {
        margin: 0;
        padding: 0;
        font-family: "Georgia", "Times New Roman", serif;
        background: linear-gradient(135deg, #f6f2e8 0%, #e9f4ef 100%);
        color: #1a1a1a;
      }
      header {
        padding: 48px 24px 24px;
        text-align: center;
      }
      h1 {
        margin: 0 0 12px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        font-size: 32px;
      }
      p {
        margin: 0 auto;
        max-width: 640px;
        line-height: 1.6;
        font-size: 18px;
      }
      main {
        padding: 24px;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 16px;
        max-width: 960px;
        margin: 0 auto 48px;
      }
      section {
        background: #ffffffcc;
        border: 1px solid #d8d1c4;
        padding: 18px;
        border-radius: 12px;
        box-shadow: 0 6px 18px rgba(0, 0, 0, 0.08);
      }
      h2 {
        margin: 0 0 8px;
        font-size: 18px;
      }
      footer {
        text-align: center;
        padding: 24px;
        font-size: 14px;
        color: #5a5a5a;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Twincap</h1>
      <p>환영합니다. 이 페이지는 서비스 소개와 업데이트를 위한 임시 루트 페이지입니다.</p>
    </header>
    <main>
      <section>
        <h2>소개</h2>
        <p>Twincap의 아이디어와 작업 방향을 정리하는 공간입니다.</p>
      </section>
      <section>
        <h2>현재 상태</h2>
        <p>프로젝트 초기 단계이며, 핵심 기능을 다듬고 있습니다.</p>
      </section>
      <section>
        <h2>연락</h2>
        <p>문의는 준비 중인 공식 채널을 통해 곧 안내드릴 예정입니다.</p>
      </section>
    </main>
    <footer>
      <p>Copyright 2026 Twincap. All rights reserved.</p>
    </footer>
  </body>
</html>
